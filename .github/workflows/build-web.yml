name: Build Dify Web
 
on:
  push:
    branches: [custom/black-theme]
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - name: Build image
        run: |
          cd web
          docker build -t dify-web-custom:1.13.3-black .

      - name: Save to tar.gz
        run: |
          docker save dify-web-custom:1.13.3-black | gzip > dify-web-custom-1.13.3-black.tar.gz
          ls -lh dify-web-custom-1.13.3-black.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: dify-web-custom-image
          path: dify-web-custom-1.13.3-black.tar.gz
          retention-days: 30
