name: Build Dify Web

on:
  push:
    branches: [custom/black-theme]
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Build image (OCI to local tar)
        run: |
          docker buildx build \
            -f web/Dockerfile \
            -t opencode-web:1.0.3 \
            --output type=oci,dest=oci-image.tar \
            web

      - name: Convert OCI to Docker v1 format (.tar)
        run: |
          mkdir -p oci-extracted
          tar -xf oci-image.tar -C oci-extracted
          skopeo copy \
            oci:oci-extracted \
            docker-archive:opencode-web-1.0.3.tar:opencode-web:1.0.3
          ls -lh opencode-web-1.0.3.tar

      - name: Verify format
        run: |
          echo "=== tar 첫 5줄 ==="
          tar -tf opencode-web-1.0.3.tar | head -5
          echo "=== manifest.json 존재? ==="
          tar -tf opencode-web-1.0.3.tar | grep -E "^manifest.json$" && echo "OK ✅" || echo "FAIL ❌"

      - uses: actions/upload-artifact@v4
        with:
          name: opencode-web-image
          path: opencode-web-1.0.3.tar
          retention-days: 30
